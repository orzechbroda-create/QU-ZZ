<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>QU!ZZ</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.box {
  background:rgba(255,255,255,0.06);
  padding:25px;
  border-radius:20px;
  width:360px;
  text-align:center;
}

input, button {
  width:90%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button {
  cursor:pointer;
  font-weight:bold;
}

.green { background:#22c55e; }
.blue { background:#38bdf8; }
.purple { background:#a855f7; }

.menu {
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:15px;
}

.option {
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  background:rgba(255,255,255,0.08);
  transition:0.2s;
}

.option:hover {
  background:rgba(255,255,255,0.15);
  transform:scale(1.02);
}

.icon {
  font-size:28px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>QU!ZZ</h2>

  <input id="user" placeholder="Nazwa">
  <input id="pass" type="password" placeholder="Hasło">

  <button class="green" onclick="login()">Zaloguj</button>
</div>

<!-- DASHBOARD -->
<div class="box" id="dashboardBox" style="display:none;">
  <h2>Panel 🎮</h2>

  <p id="welcome"></p>

  <button class="green" onclick="openLobby()">Otwórz lobby</button>
</div>

<!-- LOBBY MENU (PO KLIKNIĘCIU) -->
<div class="box" id="lobbyMenu" style="display:none;">
  <h2>🎮 Wybierz tryb</h2>

  <div class="menu">

    <div class="option" onclick="openQuizBrowser()">
      <div class="icon">📚</div>
      <div>
        <b>Przeglądaj quizy</b><br>
        <small>Wybierz kategorię i graj</small>
      </div>
    </div>

    <div class="option" onclick="openImpostor()">
      <div class="icon">🕵️‍♂️</div>
      <div>
        <b>Impostor Mode</b><br>
        <small>Znajdź oszusta wśród graczy</small>
      </div>
    </div>

  </div>
</div>

<!-- QUIZ BROWSER -->
<div class="box" id="quizBox" style="display:none;">
  <h2>📚 Quizy</h2>

  <p>🎵 Muzyka</p>
  <p>🎮 Gry</p>
  <p>🎬 Filmy</p>
  <p>🧠 Wiedza</p>

  <button onclick="back()">Powrót</button>
</div>

<!-- IMPOSTOR -->
<div class="box" id="impostorBox" style="display:none;">
  <h2>🕵️ IMPOSITOR MODE</h2>

  <p>Jeden gracz jest impostorem!</p>

  <button onclick="back()">Powrót</button>
</div>

<script>

let currentUser = null;

// ===== LOGIN =====
function login() {
  const u = user.value;
  const p = pass.value;

  if (!u || !p) return alert("Uzupełnij dane");

  currentUser = u;

  loginBox.style.display = "none";
  dashboardBox.style.display = "block";

  welcome.innerText = "Zalogowany jako: " + currentUser;
}

// ===== OPEN LOBBY (NOWY KROK) =====
function openLobby() {
  dashboardBox.style.display = "none";
  lobbyMenu.style.display = "block";
}

// ===== QUIZ BROWSER =====
function openQuizBrowser() {
  lobbyMenu.style.display = "none";
  quizBox.style.display = "block";
}

// ===== IMPOSTOR =====
function openImpostor() {
  lobbyMenu.style.display = "none";
  impostorBox.style.display = "block";
}

// ===== BACK =====
function back() {
  quizBox.style.display = "none";
  impostorBox.style.display = "none";
  lobbyMenu.style.display = "block";
}

</script>

</body>
</html>
